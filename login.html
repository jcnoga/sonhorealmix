<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Painel Admin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #2D1B69; --pink: #FF4FAD; --gold: #FFD700;
      --dark: #1A0A2E; --white: #FFFFFF; --cream: #FFF8F0;
      --radius: 16px; --shadow: 0 20px 60px rgba(45,27,105,.25);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1A0A2E, #2D1B69, #4A2C9E);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }

    .login-card {
      background: var(--white);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.8rem; color: var(--white);
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; color: var(--dark);
      margin-bottom: .5rem;
    }
    .login-subtitle { color: #6B5E8A; font-size: .9rem; margin-bottom: 2rem; }

    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }
    .form-group label {
      display: block; font-size: .85rem;
      font-weight: 600; color: var(--dark); margin-bottom: .4rem;
    }
    .form-group .input-wrap {
      position: relative;
    }
    .form-group .input-icon {
      position: absolute; left: .9rem; top: 50%;
      transform: translateY(-50%);
      color: #A89CC0; font-size: .9rem;
    }
    .form-group input {
      width: 100%; padding: .8rem 1rem .8rem 2.4rem;
      border: 1.5px solid #E0D8F0;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem; color: var(--dark);
      transition: border-color .2s;
      background: var(--cream);
    }
    .form-group input:focus {
      outline: none; border-color: var(--purple);
      background: var(--white);
    }
    .form-group .show-pw {
      position: absolute; right: .9rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: #A89CC0;
      font-size: .9rem; padding: 0;
    }

    .btn-login {
      width: 100%; padding: .9rem;
      background: linear-gradient(135deg, var(--purple), #4A2C9E);
      color: var(--white);
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: .5rem;
      transition: transform .2s, box-shadow .2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,27,105,.4); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .login-error {
      background: #FEE2E2; color: #B91C1C;
      border-radius: 8px; padding: .75rem 1rem;
      font-size: .85rem; margin-top: 1rem; display: none;
    }
    .login-success {
      background: #D1FAE5; color: #065F46;
      border-radius: 8px; padding: .75rem 1rem;
      font-size: .85rem; margin-top: .5rem; display: none;
    }
    .login-divider {
      display: flex; align-items: center; gap: .75rem;
      margin: 1rem 0 .75rem; color: #C4B8D8; font-size: .8rem;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 1px; background: #E4DEFF;
    }
    .btn-register {
      width: 100%; padding: .9rem;
      background: transparent;
      border: 1.5px solid var(--purple);
      color: var(--purple);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-register:hover {
      background: var(--purple); color: var(--white);
    }
    .btn-register:disabled { opacity: .6; cursor: not-allowed; }
    .login-back {
      display: block; margin-top: 1.5rem;
      color: #6B5E8A; font-size: .85rem;
      text-decoration: none;
      transition: color .2s;
    }
    .login-back:hover { color: var(--purple); }

    .stars {
      color: var(--gold); font-size: .75rem;
      margin-bottom: 1rem; letter-spacing: .2em;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo"><i class="fas fa-wand-magic-sparkles"></i></div>
  <div id="session-bar"></div>
  <div class="stars">✦ ✦ ✦</div>
  <h1 class="login-title">Painel Admin</h1>
  <p class="login-subtitle">Acesso restrito ao administrador da loja.</p>

  <div class="form-group">
    <label for="admin-email">E-mail</label>
    <div class="input-wrap">
      <i class="input-icon fas fa-envelope"></i>
      <input type="email" id="admin-email" placeholder="admin@suaempresa.com" autocomplete="username">
    </div>
  </div>

  <div class="form-group">
    <label for="admin-password">Senha</label>
    <div class="input-wrap">
      <i class="input-icon fas fa-lock"></i>
      <input type="password" id="admin-password" placeholder="••••••••" autocomplete="current-password">
      <button class="show-pw" type="button" id="toggle-pw" aria-label="Mostrar senha">
        <i class="fas fa-eye"></i>
      </button>
    </div>
  </div>

  <button class="btn-login" id="btn-login" type="button">
    <i class="fas fa-sign-in-alt"></i> Entrar
  </button>

  <div class="login-divider"><span>ou</span></div>

  <button class="btn-register" id="btn-register" type="button">
    <i class="fas fa-user-plus"></i> Criar conta
  </button>

  <div class="login-error"  id="login-error"></div>
  <div class="login-success" id="login-success"></div>

  <a class="login-back" href="index.html"><i class="fas fa-arrow-left"></i> Voltar para a loja</a>
</div>

<script>
"use strict";
const emailInput = document.getElementById('admin-email');
const pwInput     = document.getElementById('admin-password');
const btnLogin    = document.getElementById('btn-login');
const btnRegister = document.getElementById('btn-register');
const errDiv      = document.getElementById('login-error');
const successDiv  = document.getElementById('login-success');
const togglePw    = document.getElementById('toggle-pw');

// Ja logado -> redireciona automaticamente
auth.onAuthStateChanged(user => {
  if (user) {
    // Mostra info de sessao ativa com opcao de sair
    const card = document.querySelector('.login-card');
    const sessionBar = document.getElementById('session-bar');
    if (sessionBar) {
      sessionBar.innerHTML = `
        <div style="background:#D1FAE5;border:1px solid #6EE7B7;border-radius:10px;padding:.85rem 1rem;margin-bottom:1rem;font-size:.88rem;color:#065F46;display:flex;align-items:center;justify-content:space-between;gap:.5rem;">
          <span><i class="fas fa-check-circle"></i> Sessão ativa: <strong>${user.email}</strong></span>
          <button onclick="auth.signOut()" style="background:none;border:1px solid #059669;color:#059669;border-radius:6px;padding:.25rem .6rem;cursor:pointer;font-size:.78rem;font-family:inherit;">Sair</button>
        </div>`;
      setTimeout(() => { window.location.href = 'admin.html'; }, 1500);
    } else {
      window.location.href = 'admin.html';
    }
  }
});

// Mostrar/ocultar senha
togglePw.addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  togglePw.querySelector('i').className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
});

// Enter no campo senha
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

btnLogin.addEventListener('click', doLogin);
btnRegister.addEventListener('click', doRegister);

// ── Login ─────────────────────────────────────────────────────
async function doLogin() {
  const email = emailInput.value.trim();
  const pw    = pwInput.value;
  if (!email || !pw) { showError('Preencha e-mail e senha.'); return; }

  setLoading(btnLogin, true, '<i class="fas fa-spinner fa-spin"></i> Entrando...');
  clearMessages();

  try {
    await auth.signInWithEmailAndPassword(email, pw);
    window.location.href = 'admin.html';
  } catch (e) {
    const msgs = {
      'auth/user-not-found':    'Usuário não encontrado. Crie uma conta abaixo.',
      'auth/wrong-password':    'Senha incorreta.',
      'auth/invalid-email':     'E-mail inválido.',
      'auth/invalid-credential':'E-mail ou senha incorretos.',
      'auth/too-many-requests': 'Muitas tentativas. Aguarde alguns minutos.',
    };
    showError(msgs[e.code] || `Erro: ${e.message}`);
    setLoading(btnLogin, false, '<i class="fas fa-sign-in-alt"></i> Entrar');
  }
}

// ── Criar conta ───────────────────────────────────────────────
async function doRegister() {
  const email = emailInput.value.trim();
  const pw    = pwInput.value;
  if (!email || !pw) { showError('Preencha e-mail e senha para criar a conta.'); return; }
  if (pw.length < 6)  { showError('A senha deve ter pelo menos 6 caracteres.'); return; }

  setLoading(btnRegister, true, '<i class="fas fa-spinner fa-spin"></i> Criando...');
  clearMessages();

  try {
    await auth.createUserWithEmailAndPassword(email, pw);
    showSuccess('Conta criada! Entrando no painel...');
    setTimeout(() => { window.location.href = 'admin.html'; }, 1200);
  } catch (e) {
    const msgs = {
      'auth/email-already-in-use': 'Este e-mail ja possui uma conta. Use o botao Entrar.',
      'auth/invalid-email':        'E-mail invalido.',
      'auth/weak-password':        'Senha muito fraca. Use pelo menos 6 caracteres.',
    };
    showError(msgs[e.code] || `Erro: ${e.message}`);
    setLoading(btnRegister, false, '<i class="fas fa-user-plus"></i> Criar conta');
  }
}

// ── Helpers ───────────────────────────────────────────────────
function setLoading(btn, loading, label) {
  btn.disabled = loading;
  btn.innerHTML = label;
}
function showError(msg) {
  errDiv.textContent = msg;
  errDiv.style.display = 'block';
  successDiv.style.display = 'none';
}
function showSuccess(msg) {
  successDiv.textContent = msg;
  successDiv.style.display = 'block';
  errDiv.style.display = 'none';
}
function clearMessages() {
  errDiv.style.display = 'none';
  successDiv.style.display = 'none';
}
</script>
</body>
</html>
