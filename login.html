<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Sonho Real Mix</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:linear-gradient(135deg,#1A0A2E,#2D1B69,#4A2C9E)}
.card{background:#fff;border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(45,27,105,.35);text-align:center}
.ico{width:64px;height:64px;background:linear-gradient(135deg,#2D1B69,#FF4FAD);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.6rem;color:#fff}
.stars{color:#FFD700;letter-spacing:.2em;margin-bottom:.6rem;font-size:.8rem}
h1{font-family:'Playfair Display',serif;font-size:1.7rem;color:#1A0A2E;margin-bottom:.3rem}
.sub{color:#6B5E8A;font-size:.88rem;margin-bottom:1.75rem}
.fg{text-align:left;margin-bottom:1rem}
.fg label{display:block;font-size:.75rem;font-weight:700;color:#6B5E8A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
.iw{position:relative}
.iw i.ic{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:#A89CC0;font-size:.85rem;pointer-events:none}
.iw input{width:100%;padding:.75rem 2.5rem .75rem 2.3rem;border:1.5px solid #E4DEFF;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.93rem;background:#FFF8F0;color:#1A0A2E;transition:border-color .2s}
.iw input:focus{outline:none;border-color:#2D1B69;background:#fff}
.iw .eye{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#A89CC0;font-size:.85rem;padding:0}
.btn{width:100%;padding:.85rem;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.btn-p{background:linear-gradient(135deg,#2D1B69,#4A2C9E);color:#fff;margin-bottom:.75rem}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,27,105,.4)}
.div{display:flex;align-items:center;gap:.6rem;margin:.5rem 0;color:#C4B8D8;font-size:.78rem}
.div::before,.div::after{content:'';flex:1;height:1px;background:#E4DEFF}
.btn-o{background:transparent;border:1.5px solid #2D1B69;color:#2D1B69}
.btn-o:hover{background:#2D1B69;color:#fff}
.msg{border-radius:8px;padding:.7rem 1rem;font-size:.84rem;margin-top:.75rem;text-align:left;display:none}
.err{background:#FEE2E2;color:#B91C1C;display:block}
.suc{background:#D1FAE5;color:#065F46;display:block}
.back{display:block;margin-top:1.25rem;color:#6B5E8A;font-size:.84rem;text-decoration:none}
.back:hover{color:#2D1B69}
</style>
</head>
<body>
<div class="card">
  <div class="ico"><i class="fas fa-wand-magic-sparkles"></i></div>
  <div class="stars">✦ ✦ ✦</div>
  <h1>Painel Admin</h1>
  <p class="sub">Sonho Real Mix Fantasias</p>

  <div class="fg">
    <label>E-mail</label>
    <div class="iw">
      <i class="ic fas fa-envelope"></i>
      <input type="email" id="em" placeholder="admin@email.com" autocomplete="username">
    </div>
  </div>
  <div class="fg">
    <label>Senha</label>
    <div class="iw">
      <i class="ic fas fa-lock"></i>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
      <button class="eye" id="eye" type="button"><i class="fas fa-eye"></i></button>
    </div>
  </div>

  <button class="btn btn-p" id="btnE" type="button"><i class="fas fa-sign-in-alt"></i> Entrar</button>
  <div class="div">ou</div>
  <button class="btn btn-o" id="btnC" type="button"><i class="fas fa-user-plus"></i> Criar conta</button>
  <div class="msg" id="msg"></div>
  <a class="back" href="index.html"><i class="fas fa-arrow-left"></i> Voltar para a loja</a>
</div>

<script>
var em   = document.getElementById('em');
var pw   = document.getElementById('pw');
var btnE = document.getElementById('btnE');
var btnC = document.getElementById('btnC');
var msg  = document.getElementById('msg');
var eye  = document.getElementById('eye');

// Se ja logado, redireciona
auth.onAuthStateChanged(function(u){ if(u) go('admin.html'); });

eye.onclick = function(){
  var s = pw.type==='password';
  pw.type = s?'text':'password';
  eye.querySelector('i').className = s?'fas fa-eye-slash':'fas fa-eye';
};
pw.onkeydown = function(e){ if(e.key==='Enter') login(); };
btnE.onclick = login;
btnC.onclick = criar;

function go(url){ window.location.href = url; }
function setBtn(b,dis,html){ b.disabled=dis; b.innerHTML=html; }
function showMsg(t,c){ msg.textContent=t; msg.className='msg '+c; }

var ERROS = {
  'auth/user-not-found':    'Usuário não encontrado.',
  'auth/wrong-password':    'Senha incorreta.',
  'auth/invalid-credential':'E-mail ou senha incorretos.',
  'auth/invalid-email':     'E-mail inválido.',
  'auth/too-many-requests': 'Muitas tentativas. Aguarde.',
  'auth/email-already-in-use':'Este e-mail já tem conta. Use Entrar.',
  'auth/weak-password':     'Senha mínima: 6 caracteres.'
};

function login(){
  var e=em.value.trim(), s=pw.value;
  if(!e||!s){ showMsg('Preencha e-mail e senha.','err'); return; }
  msg.className='msg';
  setBtn(btnE,true,'<i class="fas fa-spinner fa-spin"></i> Entrando...');
  auth.signInWithEmailAndPassword(e,s)
    .then(function(){ go('admin.html'); })
    .catch(function(er){
      showMsg(ERROS[er.code]||'Erro: '+er.message,'err');
      setBtn(btnE,false,'<i class="fas fa-sign-in-alt"></i> Entrar');
    });
}

function criar(){
  var e=em.value.trim(), s=pw.value;
  if(!e||!s){ showMsg('Preencha e-mail e senha.','err'); return; }
  if(s.length<6){ showMsg('Senha mínima: 6 caracteres.','err'); return; }
  msg.className='msg';
  setBtn(btnC,true,'<i class="fas fa-spinner fa-spin"></i> Criando...');
  auth.createUserWithEmailAndPassword(e,s)
    .then(function(){
      showMsg('Conta criada! Redirecionando...','suc');
      setTimeout(function(){ go('admin.html'); },1000);
    })
    .catch(function(er){
      showMsg(ERROS[er.code]||'Erro: '+er.message,'err');
      setBtn(btnC,false,'<i class="fas fa-user-plus"></i> Criar conta');
    });
}
</script>
</body>
</html>
