<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sonho Real Mix Admin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--purple:#2D1B69;--pink:#FF4FAD;--gold:#FFD700;--dark:#1A0A2E;--white:#fff;--cream:#FFF8F0}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#1A0A2E,#2D1B69,#4A2C9E);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:#fff;border-radius:28px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(45,27,105,.3);text-align:center}
    .logo{width:68px;height:68px;background:linear-gradient(135deg,var(--purple),var(--pink));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.7rem;color:#fff}
    .stars{color:var(--gold);font-size:.75rem;letter-spacing:.2em;margin-bottom:.75rem}
    h1{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--dark);margin-bottom:.35rem}
    .sub{color:#6B5E8A;font-size:.88rem;margin-bottom:1.75rem}
    .fg{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem;text-align:left}
    .fg label{font-size:.78rem;font-weight:700;color:#6B5E8A;text-transform:uppercase;letter-spacing:.05em}
    .iw{position:relative}
    .iw i{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:#A89CC0;font-size:.85rem}
    .iw input{width:100%;padding:.75rem 1rem .75rem 2.3rem;border:1.5px solid #E4DEFF;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.93rem;background:var(--cream);color:var(--dark);transition:border-color .2s}
    .iw input:focus{outline:none;border-color:var(--purple);background:#fff}
    .iw .eye{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#A89CC0;padding:0}
    .btn-primary{width:100%;padding:.85rem;background:linear-gradient(135deg,var(--purple),#4A2C9E);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.97rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:.25rem}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,27,105,.4)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .divider{display:flex;align-items:center;gap:.6rem;margin:.9rem 0;color:#C4B8D8;font-size:.78rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#E4DEFF}
    .btn-outline{width:100%;padding:.85rem;background:transparent;border:1.5px solid var(--purple);color:var(--purple);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.97rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .btn-outline:hover{background:var(--purple);color:#fff}
    .btn-outline:disabled{opacity:.6;cursor:not-allowed}
    .msg{border-radius:8px;padding:.7rem 1rem;font-size:.84rem;margin-top:.75rem;display:none;text-align:left}
    .msg.error{background:#FEE2E2;color:#B91C1C;display:block}
    .msg.success{background:#D1FAE5;color:#065F46;display:block}
    .back{display:block;margin-top:1.25rem;color:#6B5E8A;font-size:.84rem;text-decoration:none;transition:color .2s}
    .back:hover{color:var(--purple)}
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><i class="fas fa-wand-magic-sparkles"></i></div>
  <div class="stars">✦ ✦ ✦</div>
  <h1>Painel Admin</h1>
  <p class="sub">Sonho Real Mix Fantasias</p>

  <div class="fg">
    <label>E-mail</label>
    <div class="iw">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" placeholder="admin@email.com" autocomplete="username">
    </div>
  </div>
  <div class="fg">
    <label>Senha</label>
    <div class="iw">
      <i class="fas fa-lock"></i>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
      <button class="eye" id="eye" type="button"><i class="fas fa-eye"></i></button>
    </div>
  </div>

  <button class="btn-primary" id="btn-entrar" type="button">
    <i class="fas fa-sign-in-alt"></i> Entrar
  </button>

  <div class="divider">ou</div>

  <button class="btn-outline" id="btn-criar" type="button">
    <i class="fas fa-user-plus"></i> Criar conta
  </button>

  <div class="msg" id="msg"></div>
  <a class="back" href="index.html"><i class="fas fa-arrow-left"></i> Voltar para a loja</a>
</div>

<script>
var emailEl = document.getElementById('email');
var senhaEl = document.getElementById('senha');
var btnEntrar = document.getElementById('btn-entrar');
var btnCriar  = document.getElementById('btn-criar');
var msgEl     = document.getElementById('msg');
var eyeEl     = document.getElementById('eye');

// Se ja logado, vai direto para admin
auth.onAuthStateChanged(function(user) {
  if (user) window.location.href = 'admin.html';
});

// Mostrar/ocultar senha
eyeEl.addEventListener('click', function() {
  var show = senhaEl.type === 'password';
  senhaEl.type = show ? 'text' : 'password';
  eyeEl.querySelector('i').className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
});

// Enter para logar
senhaEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });

btnEntrar.addEventListener('click', login);
btnCriar.addEventListener('click', criar);

function showMsg(txt, tipo) {
  msgEl.textContent = txt;
  msgEl.className = 'msg ' + tipo;
}

function setBtn(btn, dis, html) {
  btn.disabled = dis;
  btn.innerHTML = html;
}

function login() {
  var email = emailEl.value.trim();
  var senha = senhaEl.value;
  if (!email || !senha) { showMsg('Preencha e-mail e senha.', 'error'); return; }
  showMsg('', '');
  setBtn(btnEntrar, true, '<i class="fas fa-spinner fa-spin"></i> Entrando...');
  auth.signInWithEmailAndPassword(email, senha)
    .then(function() { window.location.href = 'admin.html'; })
    .catch(function(e) {
      var msgs = {
        'auth/user-not-found':     'Usuário não encontrado.',
        'auth/wrong-password':     'Senha incorreta.',
        'auth/invalid-credential': 'E-mail ou senha incorretos.',
        'auth/invalid-email':      'E-mail inválido.',
        'auth/too-many-requests':  'Muitas tentativas. Aguarde.'
      };
      showMsg(msgs[e.code] || ('Erro: ' + e.message), 'error');
      setBtn(btnEntrar, false, '<i class="fas fa-sign-in-alt"></i> Entrar');
    });
}

function criar() {
  var email = emailEl.value.trim();
  var senha = senhaEl.value;
  if (!email || !senha) { showMsg('Preencha e-mail e senha.', 'error'); return; }
  if (senha.length < 6) { showMsg('Senha mínima: 6 caracteres.', 'error'); return; }
  showMsg('', '');
  setBtn(btnCriar, true, '<i class="fas fa-spinner fa-spin"></i> Criando...');
  auth.createUserWithEmailAndPassword(email, senha)
    .then(function() {
      showMsg('Conta criada! Redirecionando...', 'success');
      setTimeout(function() { window.location.href = 'admin.html'; }, 1000);
    })
    .catch(function(e) {
      var msgs = {
        'auth/email-already-in-use': 'Este e-mail já tem conta. Use Entrar.',
        'auth/invalid-email':        'E-mail inválido.',
        'auth/weak-password':        'Senha muito fraca (mín. 6 caracteres).'
      };
      showMsg(msgs[e.code] || ('Erro: ' + e.message), 'error');
      setBtn(btnCriar, false, '<i class="fas fa-user-plus"></i> Criar conta');
    });
}
</script>
</body>
</html>
